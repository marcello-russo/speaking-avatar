services:
  backend:
    build:
      context: ./backend
    container_name: speaking-avatar-backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    networks:
      - speaking-net

  web-component:
    build:
      context: ./web-component
    container_name: speaking-avatar-frontend
    ports:
      - "5173:5173"
    networks:
      - speaking-net
    depends_on:
      - backend

networks:
  speaking-net:
    driver: bridge
